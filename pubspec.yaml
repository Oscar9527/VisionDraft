name: vision_draft
description: VisionDraft local-first storyboard and shoot planning app.
publish_to: 'none'
version: 0.2.1+2

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^16.0.0
  drift: ^2.28.1
  sqlite3_flutter_libs: ^0.5.39
  path: ^1.9.1
  path_provider: ^2.1.5
  file_selector: ^1.0.3
  image_picker: ^1.1.2
  archive: ^4.0.7
  xml: ^6.5.0
  crypto: ^3.0.6
  collection: ^1.19.1
  drag_and_drop_lists: ^0.4.2
  uuid: ^4.5.1
  intl: ^0.20.2
  printing: ^5.14.2
  pdf: ^3.11.3
  excel_community: ^1.0.10
  logger: ^2.6.1
  rxdart: ^0.28.0
  cupertino_icons: ^1.0.8
  share_plus: ^11.0.0
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  drift_dev: ^2.28.2
  build_runner: ^2.7.1
  mocktail: ^1.0.4
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/branding/
